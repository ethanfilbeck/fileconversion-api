<!DOCTYPE html>
<html>
<head>
  <title>FileConversion Dashboard</title>

  <style>
    body {
      font-family: Arial;
      background: #0f172a;
      color: white;
      padding: 20px;
    }

    input, button {
      margin-top: 10px;
      padding: 8px;
      display: block;
    }

    #status {
      margin-top: 15px;
      color: #38bdf8;
    }
  </style>
</head>

<body>

  <h2>Upload File</h2>

  <input type="file" id="fileInput" />
  <button onclick="uploadFile()">Upload</button>

  <div id="status"></div>

  <script>
    async function uploadFile() {
      const fileInput = document.getElementById("fileInput");
      const status = document.getElementById("status");
      const file = fileInput.files[0];

      if (!file) {
        alert("Pick a file first");
        return;
      }

      status.innerText = "Uploading...";

      try {
        const formData = new FormData();
        formData.append("file", file);

        const res = await fetch("https://fileconversion-api.ethanfilbeck.workers.dev/upload/", {
          method: "POST",
          body: formData
        });

        if (!res.ok) {
          throw new Error("Upload failed");
        }

        const data = await res.json();

        console.log(data);

        if (data?.file?.fileKey) {
          if (navigator.clipboard && window.isSecureContext) {
            await navigator.clipboard.writeText(data.file.fileKey);
          }

          status.innerText = "Upload complete — fileKey copied!";
        } else {
          status.innerText = "Upload failed.";
        }

      } catch (err) {
        console.error(err);
        status.innerText = "Error uploading file.";
      }
    }
  </script>

</body>
</html>
