<!DOCTYPE html>
<html>
<head>
  <title>FileConversion Dashboard</title>
  <style>
    body {
      font-family: Arial;
      background: #0f172a;
      color: white;
      padding: 20px;
    }

    .box {
      border: 2px dashed #64748b;
      padding: 30px;
      text-align: center;
      margin-bottom: 20px;
      cursor: pointer;
    }

    .file {
      background: #1e293b;
      padding: 10px;
      margin: 10px 0;
      border-radius: 8px;
    }

    button {
      padding: 6px 10px;
      margin-top: 5px;
      cursor: pointer;
    }
  </style>
</head>

<body>

<h1>📁 FileConversion Dashboard</h1>

<div class="box" id="dropzone">
  Drag & Drop File Here or Click
</div>

<h2>Uploaded Files</h2>
<div id="files"></div>

<script>
const API = "https://fileconversion-api.ethanfilbeck.workers.dev";

// ================= UPLOAD =================
const dropzone = document.getElementById("dropzone");

dropzone.onclick = () => {
  const input = document.createElement("input");
  input.type = "file";
  input.onchange = () => uploadFile(input.files[0]);
  input.click();
};

dropzone.ondragover = e => e.preventDefault();

dropzone.ondrop = e => {
  e.preventDefault();
  uploadFile(e.dataTransfer.files[0]);
};

async function uploadFile(file) {
  const form = new FormData();
  form.append("file", file);

  await fetch(API + "/upload", {
    method: "POST",
    body: form
  });

  loadFiles();
}

// ================= LOAD FILES =================
async function loadFiles() {
  const res = await fetch(API + "/files");
  const data = await res.json();

  const container = document.getElementById("files");
  container.innerHTML = "";

  data.files.forEach(f => {
    const div = document.createElement("div");
    div.className = "file";

    div.innerHTML = `
      <b>${f.name}</b><br/>
      ${f.size} bytes<br/>
      <a href="${API}${f.url}" target="_blank">
        <button>Download</button>
      </a>
    `;

    container.appendChild(div);
  });
}

loadFiles();
</script>

</body>
</html>
